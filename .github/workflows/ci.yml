name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        # Not `npm ci`: the lockfile records optional-dep binaries for the
        # author's platform only (see npm/cli#4828), so `npm ci` on Linux
        # fails to resolve @rolldown/binding-linux-x64-gnu. `npm install`
        # re-resolves optionalDependencies for the current platform.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e
